{{ define "main" }}
  <section class="section-sm">
    <div class="container">
      <div class="row justify-center">
        <div class="md:col-10 lg:col-8">
          {{ if .Params.image }}
            <div class="mb-6 flex justify-center">
              <img
                src="{{ .Params.image }}"
                alt="{{ .Title }}"
                loading="eager"
                class="rounded-full object-cover shadow-lg border-4 border-theme-light"
                style="width: 176px; height: 176px;"
              />
            </div>
          {{ end }}
          <h2 class="h3 mb-6 text-center">{{ .Title }}</h2>
          <div class="content">{{ .Content }}</div>
        </div>
      </div>
    </div>
  </section>
{{ end }}
