{{ define "main" }}
  <section class="section-sm">
    <div class="container">
      <div class="row justify-center">
        <div class="md:col-10 lg:col-8">
          {{ if .Params.image }}
            <div class="mb-6 flex justify-center">
              {{ partial "image" (dict "Src" .Params.image "Context" .Page "Alt" .Title "Class" "rounded-full w-44 h-44 object-cover shadow-lg border-4 border-theme-light" "Size" "200x200") }}
            </div>
          {{ end }}
          <h2 class="h3 mb-6 text-center">{{ .Title }}</h2>
          <div class="content">{{ .Content }}</div>
        </div>
      </div>
    </div>
  </section>
{{ end }}
