[build]
  command = "npm install --include=dev && npx tailwindcss --help && npm run build"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.160.1"
  HUGO_ENV = "production"

[context.production.environment]
  HUGO_ENV = "production"

[context.deploy-preview]
  command = "npm install --include=dev && npx tailwindcss --help && npm run build"

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
